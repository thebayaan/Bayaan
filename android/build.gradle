// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    // gradle-play-publisher: ./gradlew publishReleaseBundle uploads the
    // signed AAB to the Play Console. Reads service-account credentials
    // from BAYAAN_PLAY_SERVICE_ACCOUNT (gradle property or env var).
    classpath('com.github.triplet.gradle:play-publisher:3.11.0')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
