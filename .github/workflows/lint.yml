name: Lint & Typecheck

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Prettier, ESLint, TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prettier
        if: success() || failure()
        run: npx prettier --check .

      # ESLint is non-blocking for now — the repo has pre-existing lint debt
      # (69 errors as of this workflow's introduction) that will be cleaned up
      # in a follow-up PR. Failures here surface as a red step but don't block
      # the job.
      - name: ESLint
        if: success() || failure()
        continue-on-error: true
        run: npm run lint

      - name: TypeScript
        if: success() || failure()
        run: npx tsc --noEmit
